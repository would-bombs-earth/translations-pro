<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>极译</title>
    <style>
        /* JiYi · Frost Glass */
        :root {
            --bg-base: #080c16;
            --bg-elevated: #101626;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-bg-hover: rgba(255, 255, 255, 0.08);
            --glass-bg-active: rgba(255, 255, 255, 0.11);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.16);
            --glass-blur: 20px;
            --text: #e4eaf2;
            --sub: #8892a8;
            --accent: #5b9cf5;
            --accent-dim: #3d7ad6;
            --accent-glow: rgba(91, 156, 245, 0.22);
            --accent-soft: rgba(91, 156, 245, 0.08);
            --accent-gradient: linear-gradient(135deg, #5b9cf5, #818cf8);
            --surface-1: rgba(255, 255, 255, 0.04);
            --surface-2: rgba(255, 255, 255, 0.07);
            --surface-3: rgba(255, 255, 255, 0.10);
            --surface-4: rgba(255, 255, 255, 0.14);
            --green: #2dd4a8;
            --green-glow: rgba(45, 212, 168, 0.22);
            --blue: #60a5fa;
            --purple: #a78bfa;
            --purple-glow: rgba(167, 139, 250, 0.18);
            --rose: #f87171;
            --rose-glow: rgba(248, 113, 113, 0.18);
            --amber: #fbbf24;
            --amber-glow: rgba(251, 191, 36, 0.15);
            --warm: #f472b6;
            --warm-glow: rgba(244, 114, 182, 0.18);
            --radius-sm: 7px;
            --radius: 9px;
            --radius-lg: 11px;
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 3px 14px rgba(0, 0, 0, 0.45);
            --shadow-lg: 0 6px 28px rgba(0, 0, 0, 0.55);
            --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --font:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }

        .glass {
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .menu-item,
        .eng-card,
        .domain-row .input-wrap input,
        .domain-row .btn-icon {
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
        }

        svg {
            stroke: currentColor;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            width: 340px;
            min-height: 300px;
            overflow-x: hidden;
            overflow-y: visible;
            color-scheme: dark;
            background: var(--bg-base);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(91, 156, 245, 0.22);
            box-shadow:
                var(--shadow-lg),
                0 0 0 1px rgba(0, 0, 0, 0.35);
            border-radius: 10px;
        }

        html::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(91, 156, 245, 0.16),
                    transparent);
            pointer-events: none;
            z-index: 1;
        }

        body {
            color: var(--text);
            font-family: var(--font);
            font-size: 13.5px;
            line-height: 1.5;
            -webkit-font-smoothing: auto;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            z-index: 0;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .brand-bar {
            font-size: 10.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.12);
            text-align: center;
            padding: 5px 0 3px;
            letter-spacing: 3px;
            user-select: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-transform: uppercase;
            font-family: var(--font);
        }

        .menu {
            padding: 6px 8px 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius);
            cursor: default;
            transition:
                background var(--transition),
                border-color var(--transition),
                transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.2s ease;
            min-height: 44px;
            margin: 4px 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .menu-item.clickable {
            cursor: pointer;
        }

        .menu-item.clickable:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            box-shadow: 0 0 0 1px var(--accent-soft);
            transform: translateY(-1px);
        }

        .menu-item.clickable:active {
            background: var(--glass-bg-active);
            transform: scale(0.985);
        }

        .menu-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sub);
            transition: color var(--transition);
        }

        .menu-icon svg {
            width: 18px;
            height: 18px;
            stroke-width: 1.6;
        }

        .menu-item:hover .menu-icon.blue {
            color: var(--blue);
        }

        .menu-item:hover .menu-icon.accent {
            color: var(--accent);
        }

        .menu-item:hover .menu-icon.green {
            color: var(--green);
        }

        .menu-item:hover .menu-icon.rose {
            color: var(--rose);
        }

        .menu-item:hover .menu-icon.warm {
            color: var(--warm);
        }

        .menu-item:hover .menu-icon.purple {
            color: var(--purple);
        }

        .menu-icon.attn {
            color: var(--amber);
        }

        .menu-body {
            flex: 1;
            min-width: 0;
        }

        .menu-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13.5px;
            font-weight: 600;
            letter-spacing: 0;
            line-height: 1.35;
            flex-wrap: wrap;
        }

        .menu-sub {
            font-size: 11px;
            color: var(--sub);
            line-height: 1.35;
            margin-top: 1px;
            font-weight: 500;
        }

        /* -- Help tip -- */
        .help-tip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--sub);
            font-size: 10px;
            font-weight: 700;
            cursor: help;
            flex-shrink: 0;
            transition:
                background 0.15s,
                color 0.15s,
                border-color 0.15s;
            line-height: 1;
        }

        .help-tip:hover {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: rgba(91, 156, 245, 0.22);
        }

        .help-tip .help-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 16, 0.98);
            color: var(--text);
            font-size: 11.5px;
            font-weight: 500;
            line-height: 1.55;
            padding: 7px 11px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }

        .help-tip .help-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(255, 255, 255, 0.05);
        }

        .help-tip:hover .help-text {
            display: block;
        }

        /* -- Chevron -- */
        .menu-chevron {
            color: rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            transition:
                transform 0.22s ease,
                color var(--transition);
        }

        .menu-item.open .menu-chevron {
            transform: rotate(90deg);
            color: var(--accent);
        }

        .menu-divider {
            height: 2px;
        }

        /* -- Sub content -- */
        .menu-sub-content {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            padding: 0 10px 0 48px;
            transition:
                max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.25s ease,
                padding 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-sub-content.show {
            max-height: 600px;
            opacity: 1;
            padding: 5px 10px 7px 48px;
        }

        #engineContent.show {
            padding: 5px 10px 7px 10px;
        }

        /* State icon & Toggle */
        #stateIcon {
            color: var(--sub);
            transition:
                color 0.25s,
                filter 0.25s;
        }

        #stateIcon.on {
            color: var(--green);
            filter: drop-shadow(0 0 6px var(--green-glow));
        }

        .toggle {
            position: relative;
            width: 42px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition:
                background 0.22s ease,
                box-shadow 0.22s ease;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .toggle-slider::before {
            content: "";
            position: absolute;
            top: 1.5px;
            left: 1.5px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            transition: transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toggle input:checked+.toggle-slider {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .toggle input:checked+.toggle-slider::before {
            transform: translateX(18px);
        }

        /* Engine Cards */
        .eng-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px 0;
        }

        .eng-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius);
            cursor: pointer;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Colored left bar */
        .eng-card::before {
            content: "";
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 0;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: transparent;
            opacity: 0;
            transition: all 0.25s ease;
        }

        #cardMS::before {
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue);
        }

        #cardGG::before {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

        .eng-card.selected::before {
            opacity: 1;
        }

        /* Checkmark (Microsoft card only) */
        .eng-card::after {
            content: none;
        }

        #cardMS::after,
        #cardGG::after {
            content: "✓";
            position: absolute;
            top: 9px;
            right: 10px;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #cardMS::after {
            color: var(--blue);
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        #cardGG::after {
            color: var(--green);
            text-shadow: 0 0 8px rgba(45, 212, 168, 0.4);
        }

        #cardMS.selected::after,
        #cardGG.selected::after {
            opacity: 1;
            transform: scale(1);
        }

        .eng-card:hover {
            background: var(--surface-3);
            border-color: var(--glass-border-hover);
            transform: translateX(2px) translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .eng-card:active {
            transform: scale(0.985);
        }

        .eng-card.selected {
            border-color: rgba(91, 156, 245, 0.35);
            background: linear-gradient(105deg,
                    rgba(91, 156, 245, 0.08),
                    rgba(91, 156, 245, 0.015));
            box-shadow: 0 0 0 1px rgba(91, 156, 245, 0.06);
        }

        .eng-card.selected:hover {
            border-color: rgba(91, 156, 245, 0.45);
            background: linear-gradient(105deg,
                    rgba(91, 156, 245, 0.12),
                    rgba(91, 156, 245, 0.025));
            transform: translateX(3px);
        }

        .eng-card.selected .eng-card-icon {
            box-shadow: 0 0 0 3px rgba(91, 156, 245, 0.12);
            transform: scale(1.08);
        }

        .eng-card.selected .eng-card-name {
            color: var(--accent);
        }

        .eng-card.selected .eng-card-tag {
            opacity: 1;
        }

        /* Icon */
        .eng-card-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition:
                box-shadow 0.25s ease,
                transform 0.25s ease;
        }

        .eng-card-icon.ms {
            background: linear-gradient(135deg,
                    rgba(96, 165, 250, 0.25),
                    rgba(96, 165, 250, 0.08));
            color: var(--blue);
            border: 1px solid rgba(96, 165, 250, 0.18);
        }

        .eng-card-icon.gg {
            background: linear-gradient(135deg,
                    rgba(45, 212, 168, 0.25),
                    rgba(45, 212, 168, 0.08));
            color: var(--green);
            border: 1px solid rgba(45, 212, 168, 0.18);
        }

        .eng-card-icon svg {
            width: 17px;
            height: 17px;
            stroke-width: 1.8;
        }

        /* Info block */
        .eng-card-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        /* Name row */
        .eng-card-name-row {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* Name */
        .eng-card-name {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0;
            transition: color 0.25s ease;
            line-height: 1.2;
        }

        /* Tagline */
        .eng-card-tag {
            font-size: 10px;
            font-weight: 500;
            color: var(--sub);
            opacity: 0.6;
            transition: opacity 0.25s ease;
            line-height: 1.2;
        }

        /* Latency pill */
        .eng-card-latency {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.01em;
            line-height: 1;
            padding: 2px 7px;
            border-radius: 999px;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .eng-card-latency.testing {
            color: var(--sub);
            background: rgba(255, 255, 255, 0.05);
        }

        .eng-card-latency.fast {
            color: var(--green);
            background: var(--green-glow);
        }

        .eng-card-latency.mid {
            color: var(--amber);
            background: var(--amber-glow);
        }

        .eng-card-latency.slow {
            color: var(--rose);
            background: var(--rose-glow);
        }

        .eng-card-latency.dead {
            color: var(--rose);
            background: rgba(248, 113, 113, 0.1);
        }

        .eng-card.dead-card {
            opacity: 0.38;
            pointer-events: none;
            filter: grayscale(0.4) brightness(0.7);
        }

        /* Status & Error */
        #netError {
            display: none;
            padding: 10px 14px;
            text-align: center;
            font-size: 11.5px;
            line-height: 1.5;
            color: var(--rose);
            font-weight: 500;
            background: linear-gradient(90deg, transparent, var(--rose-glow), transparent);
            border-top: 1px solid rgba(248, 113, 113, 0.12);
            letter-spacing: 0.01em;
        }

        #netError.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        #status {
            min-height: 32px;
            padding: 6px 14px 8px;
            text-align: center;
            font-size: 11.5px;
            line-height: 1.5;
            color: var(--green);
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: opacity 0.2s ease, color 0.2s ease;
        }

        #status.err {
            color: var(--rose);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-2px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Domain Management */
        #domainContent.show {
            padding-left: 10px;
        }

        /* KV Sync card */
        .kv-sync-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 0;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .kv-sync-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .kv-sync-header:hover {
            background: var(--glass-bg-hover);
        }

        .kv-sync-header .kv-sync-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(167, 139, 250, 0.12);
            color: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .kv-sync-header .kv-sync-icon svg {
            width: 12px;
            height: 12px;
            stroke-width: 1.8;
        }

        .kv-sync-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        .kv-status-badge {
            font-size: 9.5px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 2px 8px;
            border-radius: 999px;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .kv-status-badge.idle {
            color: var(--sub);
            background: rgba(255, 255, 255, 0.05);
        }

        .kv-status-badge.ok {
            color: var(--green);
            background: var(--green-glow);
        }

        .kv-status-badge.err {
            color: var(--rose);
            background: var(--rose-glow);
        }

        .kv-sync-chevron {
            color: rgba(255, 255, 255, 0.15);
            transition: transform 0.22s ease;
            flex-shrink: 0;
            display: flex;
        }

        .kv-sync-box.open .kv-sync-chevron {
            transform: rotate(90deg);
            color: var(--accent);
        }

        .kv-sync-body {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
        }

        .kv-sync-box.open .kv-sync-body {
            max-height: 200px;
            opacity: 1;
        }

        .kv-sync-body-inner {
            padding: 0 10px 10px;
        }

        .kv-sync-field {
            margin-bottom: 5px;
        }

        .kv-sync-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--sub);
            margin-bottom: 2px;
            letter-spacing: 0.02em;
        }

        .kv-sync-field input {
            width: 100%;
            height: 30px;
            border: 1px solid var(--glass-border);
            border-radius: 5px;
            padding: 0 9px;
            font-size: 11.5px;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        }

        .kv-sync-field input:focus {
            border-color: rgba(167, 139, 250, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.08);
        }

        .kv-sync-field input::placeholder {
            color: rgba(255, 255, 255, 0.18);
        }

        .kv-sync-row {
            display: flex;
            gap: 6px;
        }

        .kv-sync-row .kv-sync-field {
            flex: 1;
            min-width: 0;
        }

        .kv-sync-actions {
            display: flex;
            gap: 6px;
            margin-top: 7px;
        }

        .kv-sync-act-btn {
            flex: 1;
            height: 28px;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--font);
            color: var(--sub);
            background: rgba(255, 255, 255, 0.03);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .kv-sync-act-btn:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text);
        }

        .kv-sync-act-btn:active {
            transform: scale(0.97);
        }

        .kv-sync-act-btn svg {
            width: 12px;
            height: 12px;
        }

        #kvCfgImportInput {
            display: none;
        }

        .domain-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 2px;
            margin-bottom: 4px;
        }

        .domain-table tr {
            transition: background 0.15s;
        }

        .domain-table tr:hover td {
            background: var(--glass-bg-hover);
        }

        .domain-table td {
            background: var(--glass-bg);
            padding: 5px 7px;
            font-size: 12px;
            vertical-align: middle;
            transition: background 0.15s;
        }

        .domain-table td:first-child {
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
            width: 22px;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            opacity: 0.65;
        }

        .domain-table td:nth-child(2) {
            color: var(--text);
            word-break: break-all;
            font-weight: 480;
        }

        .domain-table td:last-child {
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            width: 26px;
            text-align: center;
        }

        .domain-table .del {
            cursor: pointer;
            color: var(--sub);
            opacity: 0.45;
            font-size: 13px;
            transition:
                opacity 0.15s,
                color 0.15s;
            line-height: 1;
            display: inline-block;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .domain-table .del:hover {
            opacity: 1;
            color: var(--rose);
            background: var(--rose-glow);
        }

        .domain-empty {
            font-size: 11.5px;
            color: var(--sub);
            text-align: center;
            padding: 12px 0;
            opacity: 0.7;
        }

        .domain-table mark {
            background: var(--accent-soft);
            color: var(--green);
            border-radius: 2px;
            padding: 0 2px;
            font-weight: 600;
        }

        .domain-toggle-btn {
            width: 100%;
            margin: 1px 0 4px;
            padding: 5px 0;
            background: none;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--sub);
            font-size: 11.5px;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.12s;
        }

        .domain-toggle-btn:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text);
        }

        /* -- Domain input -- */
        .domain-row {
            display: flex;
            gap: 4px;
            margin-bottom: 5px;
        }

        .domain-row .input-wrap {
            flex: 1;
            position: relative;
        }

        .domain-row .input-wrap input {
            width: 100%;
            height: 32px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 0 28px 0 9px;
            font-size: 12.5px;
            font-family: var(--font);
            background: var(--glass-bg);
            color: var(--text);
            outline: none;
            transition:
                border-color 0.15s,
                background 0.15s,
                box-shadow 0.15s;
        }

        .domain-row .input-wrap input:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 2px var(--accent-soft);
        }

        .domain-row .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.22);
            font-size: 12px;
        }

        /* -- Clear button -- */
        .input-clear {
            position: absolute;
            right: 7px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.12s;
        }

        .input-clear svg {
            width: 8px;
            height: 8px;
            display: block;
            stroke-width: 3;
        }

        .input-clear:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .input-clear:active {
            transform: translateY(-50%) scale(0.9);
        }

        .input-clear.show {
            display: flex;
        }

        .domain-row .btn-icon {
            width: 30px;
            height: 30px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            background: var(--glass-bg);
            color: var(--sub);
            padding: 0;
            transition: all 0.12s;
        }

        .domain-row .btn-icon svg {
            width: 13px;
            height: 13px;
            display: block;
            stroke-width: 2;
        }

        .domain-row .btn-icon:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: #ffffff;
            transform: scale(1.03);
        }

        .domain-row .btn-site svg {
            width: 14px;
            height: 14px;
            stroke-width: 2;
        }
        /* Disabled state */
        .menu-item.disabled {
            opacity: 0.35;
            pointer-events: none;
        }
        /* Custom Tooltip */
        .custom-tooltip {
            position: fixed;
            background: rgba(10, 10, 16, 0.98);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.55;
            padding: 6px 9px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 3px 14px rgba(0, 0, 0, 0.45);
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, 4px);
            transition:
                opacity 0.12s ease,
                transform 0.12s ease;
        }

        .custom-tooltip.show {
            opacity: 1;
            transform: translate(-50%, 0px);
        }

        .custom-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, 0);
            border: 5px solid transparent;
            border-top-color: rgba(14, 14, 20, 0.96);
        }

        .custom-tooltip.bottom {
            transform: translate(-50%, -4px);
        }

        .custom-tooltip.bottom.show {
            transform: translate(-50%, 0px);
        }

        .custom-tooltip.bottom::after {
            top: auto;
            bottom: 100%;
            border-top-color: transparent;
            border-bottom-color: rgba(14, 14, 20, 0.96);
        }
    </style>
</head>

<body>
    <div class="brand-bar">极译</div>
    <div class="menu">
        <div class="menu-item">
            <span class="menu-icon" id="stateIcon"><svg viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">当前页面<span class="help-tip">?<span class="help-text">显示当前网页的翻译状态</span></span>
                    <span id="stateText" style="font-weight: 600">查询中…</span></span>
            </div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item">
            <span class="menu-icon blue"><svg viewBox="0 0 24 24">
                    <path d="M21.5 2v6h-6" />
                    <path d="M2.5 22v-6h6" />
                    <path d="M21.34 15.57a10 10 0 0 1-17.56 2.18" />
                    <path d="M2.66 8.43a10 10 0 0 1 17.56-2.18" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">自动翻译<span class="help-tip">?<span
                            class="help-text">打开页面时自动翻译外文内容</span></span></span>
            </div>
            <label class="toggle">
                <input type="checkbox" id="autoTranslate" checked />
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="menu-item clickable" id="action">
            <span class="menu-icon warm"><svg viewBox="0 0 24 24">
                    <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor" stroke="none" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label"><span id="actionLabel">翻译此页</span><span class="help-tip">?<span
                            class="help-text">手动翻译/恢复当前网页的文本内容</span></span></span>
            </div>
            <span class="menu-chevron"><svg width="7" height="12" viewBox="0 0 7 12">
                    <path d="M1 1l5 5-5 5" />
                </svg></span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item clickable" id="engineToggle">
            <span class="menu-icon green"><svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                    <path d="M2 12h20" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">翻译引擎<span class="help-tip">?<span class="help-text">选择要使用的翻译服务<br />支持 Google /
                            微软 / 腾讯云</span></span></span>
            </div>
            <span class="menu-chevron"><svg width="7" height="12" viewBox="0 0 7 12">
                    <path d="M1 1l5 5-5 5" />
                </svg></span>
        </div>
        <div class="menu-sub-content" id="engineContent">
            <!-- 引擎卡片 — 三引擎：Google(默认) / 微软 / 腾讯云 -->
            <div class="eng-cards">
                <div class="eng-card" id="cardMS">
                    <div class="eng-card-icon ms">
                        <svg viewBox="0 0 24 24">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                            <line x1="8" y1="21" x2="16" y2="21" />
                            <line x1="12" y1="17" x2="12" y2="21" />
                        </svg>
                    </div>
                    <div class="eng-card-info">
                        <div class="eng-card-name-row">
                            <div class="eng-card-name">微软翻译</div>
                            <div class="eng-card-latency testing" id="latencyMS">—</div>
                        </div>
                        <div class="eng-card-tag">免费 · 快速响应</div>
                    </div>
                </div>
                <div class="eng-card" id="cardGG">
                    <div class="eng-card-icon gg">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                    </div>
                    <div class="eng-card-info">
                        <div class="eng-card-name-row">
                            <div class="eng-card-name">Google 翻译</div>
                            <div class="eng-card-latency testing" id="latencyGG">—</div>
                        </div>
                        <div class="eng-card-tag">免费 · 无需配置 · 推荐</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item clickable" id="domainToggle">
            <span class="menu-icon rose"><svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <path d="m4.9 4.9 14.2 14.2" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">排除域名<span class="help-tip">?<span
                            class="help-text">这些域名下不自动翻译，仍可手动触发<br /><span id="domainCount">0
                                个域名</span></span></span></span>
            </div>
            <span class="menu-chevron"><svg width="7" height="12" viewBox="0 0 7 12">
                    <path d="M1 1l5 5-5 5" />
                </svg></span>
        </div>
        <div class="menu-sub-content" id="domainContent">
            <div class="kv-sync-box" id="kvSyncBox">
                <div class="kv-sync-header" id="kvSyncHeader">
                    <div class="kv-sync-icon">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10" />
                            <path d="M2 12h20" />
                        </svg>
                    </div>
                    <span class="kv-sync-title">Cloudflare KV 同步</span>
                    <span class="kv-status-badge idle" id="kvStatusBadge">未配置</span>
                    <span class="kv-sync-chevron">
                        <svg width="8" height="13" viewBox="0 0 8 13">
                            <path d="M1 1.5l5 5-5 5" />
                        </svg>
                    </span>
                </div>
                <div class="kv-sync-body">
                    <div class="kv-sync-body-inner">
                        <div class="kv-sync-field">
                            <label for="cfApiToken">API Token</label>
                            <input type="password" id="cfApiToken" placeholder="cfut_..." />
                        </div>
                        <div class="kv-sync-row">
                            <div class="kv-sync-field">
                                <label for="cfAccountId">Account ID</label>
                                <input type="text" id="cfAccountId" placeholder="39e45db..." />
                            </div>
                            <div class="kv-sync-field">
                                <label for="cfNamespaceId">Namespace ID</label>
                                <input type="text" id="cfNamespaceId" placeholder="fe21961..." />
                            </div>
                        </div>
                        <div class="kv-sync-actions">
                            <button class="kv-sync-act-btn" id="kvCfgExport">
                                <svg viewBox="0 0 24 24">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                导出配置
                            </button>
                            <button class="kv-sync-act-btn" id="kvCfgImport">
                                <svg viewBox="0 0 24 24">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="3 15 12 8 21 15" />
                                    <line x1="12" y1="8" x2="12" y2="21" />
                                </svg>
                                导入配置
                            </button>
                        </div>
                    </div>
                </div>
                <input type="file" id="kvCfgImportInput" accept=".json" />
            </div>
            <div class="domain-row">
                <div class="input-wrap">
                    <input type="text" id="domainInput" placeholder="example.com" />
                    <button class="input-clear" id="domainClear" type="button" data-tooltip="清空输入">
                        <svg viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <button class="btn-icon btn-site" id="domainAddCurrent" data-tooltip="添加当前站点">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M2 12h20" />
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                    </svg>
                </button>
                <button class="btn-icon btn-add" id="domainAdd" data-tooltip="添加输入域名">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div id="domainList"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item clickable" id="exportTranslations">
            <span class="menu-icon purple"><svg viewBox="0 0 24 24">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">导出译文<span class="help-tip">?<span
                            class="help-text">导出已翻译的原文-译文对照表</span></span></span>
            </div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item clickable" id="exportLogs">
            <span class="menu-icon purple"><svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg></span>
            <div class="menu-body">
                <span class="menu-label">导出日志<span class="help-tip">?<span class="help-text">收集所有日志 (页面 + 后台)
                            并下载为文本文件</span></span></span>
            </div>
        </div>
    </div>
    <div id="status"></div>
    <div id="netError">
        ⚠️ 当前网络异常，所有翻译引擎均不可用，请检查网络后刷新页面重试
    </div>
    <div id="tooltip" class="custom-tooltip"></div>
    <script src="options.js"></script>
</body>

</html>
